<!DOCTYPE html>
<html lang="zh-CN" data-v="20260710">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>前任 AI - Ex Chat</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  :root {
    --bg: #EDEDED; --topbar: #2E2E2E; --bubble-self: #95EC69;
    --bubble-other: #FFF; --text: #1A1A1A; --muted: #999;
    --green: #07C160; --danger: #E04840; --border: #E0E0E0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{height:100%;overflow:hidden}
  body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  .page{display:none;flex-direction:column;height:100%;width:100%;overflow:hidden}
  .page.active{display:flex}

  /* === Landing === */
  .landing{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .landing-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:24px 20px 40px;text-align:center}
  .landing h1{font-size:38px;margin-bottom:6px}
  .landing .sub{font-size:14px;opacity:.6;margin-bottom:24px;line-height:1.6}
  .landing .card{background:rgba(255,255,255,.08);border-radius:16px;padding:22px;max-width:380px;width:100%}
  .landing .card p{font-size:13px;opacity:.7;margin-bottom:10px;text-align:left}
  .landing input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:14px;outline:none;margin-bottom:8px;font-family:monospace}
  .landing input::placeholder{color:rgba(255,255,255,.35)}
  .btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--green);color:#fff}
  .btn-primary:active{background:#06AD56}
  .btn-secondary{background:rgba(255,255,255,.15);color:#fff}
  .landing .note{font-size:11px;opacity:.4;margin-top:16px;line-height:1.6}
  .landing .note a{color:inherit}
  .mini-ex-list{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 12px;justify-content:center}
  .mini-ex-tag{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer}
  .mini-ex-tag:active{background:rgba(255,255,255,.25)}

  /* === Chat Page === */
  .chat-bg{position:absolute;inset:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:.12;pointer-events:none;z-index:0}
  .topbar{background:var(--topbar);color:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:max(8px,env(safe-area-inset-top));position:relative;z-index:1}
  .topbar .back{font-size:20px;cursor:pointer;opacity:.8;min-width:24px}
  .topbar .info{flex:1;min-width:0;text-align:center}
  .topbar .name{font-size:17px;font-weight:600}
  .topbar .act-btn{font-size:11px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;border-radius:5px;cursor:pointer;white-space:nowrap}

  .messages{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;position:relative;z-index:1}
  .msg-row{display:flex;gap:8px;max-width:78%;animation:fadeUp .2s;align-items:flex-end}
  .msg-row.self{align-self:flex-end;flex-direction:row-reverse}
  .msg-row.other{align-self:flex-start}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg-avatar{width:34px;height:34px;border-radius:6px;object-fit:cover;background:#ddd;flex-shrink:0}
  .msg-avatar.no-img{display:none}
  .bubble-wrap{display:flex;flex-direction:column;gap:3px}
  .self .bubble-wrap{align-items:flex-end}
  .other .bubble-wrap{align-items:flex-start}
  .bubble{padding:9px 12px;border-radius:8px;font-size:15px;line-height:1.5;white-space:pre-wrap;word-break:break-word;position:relative;z-index:1}
  .self .bubble{background:var(--bubble-self);color:#000;border-top-right-radius:2px;margin-right:0}
  .other .bubble{background:var(--bubble-other);color:var(--text);border-top-left-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,.06)}

  .empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:#BBB;gap:10px;text-align:center;padding:40px}
  .empty-chat .icon{font-size:36px}

  .input-area{background:#F7F7F7;padding:8px 10px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;border-top:1px solid var(--border);padding-bottom:max(8px,env(safe-area-inset-bottom));position:relative;z-index:1}
  .input-area .emoji-btn{width:36px;height:36px;border:none;background:0;font-size:22px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .input-area textarea{flex:1;border:1px solid #DDD;border-radius:8px;padding:8px 12px;font-size:15px;outline:none;background:#fff;resize:none;min-height:36px;max-height:100px;line-height:1.4;font-family:inherit}
  .input-area textarea:focus{border-color:var(--green)}
  .input-area button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0}
  .input-area button:active{background:#06AD56}
  .input-area button:disabled{background:#BEBEBE}

  /* Emoji Picker */
  .emoji-picker{display:none;position:absolute;bottom:100%;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:10px;z-index:10;flex-wrap:wrap;gap:6px;justify-content:center;max-height:180px;overflow-y:auto}
  .emoji-picker.show{display:flex}
  .emoji-picker span{font-size:24px;cursor:pointer;padding:4px;border-radius:6px}
  .emoji-picker span:active{background:#eee}

  /* === Create Page === */
  .create-page{background:var(--bg)}
  .createtop{background:var(--topbar);color:#fff;padding:12px 16px;font-size:17px;font-weight:600;text-align:center;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
  .create-form{flex:1;padding:20px;max-width:520px;margin:0 auto;min-height:0;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .create-form h3{font-size:15px;margin:18px 0 6px;color:#555;border-bottom:1px solid #eee;padding-bottom:4px}
  .create-form h3:first-child{margin-top:0}
  .create-form label{font-size:12px;color:#888;display:block;margin-bottom:2px}
  .create-form input,.create-form textarea,.create-form select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #DDD;font-size:14px;outline:none;font-family:inherit;margin-bottom:8px;background:#fff}
  .create-form textarea{resize:vertical;min-height:60px}
  .create-form select{appearance:auto}
  .create-form input:focus,.create-form textarea:focus,.create-form select:focus{border-color:var(--green)}
  .create-form .row{display:flex;gap:8px}
  .create-form .row>*{flex:1;min-width:0}
  .img-upload{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .img-upload .preview{width:60px;height:60px;border-radius:10px;object-fit:cover;background:#eee;border:1px dashed #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .img-upload .preview img{width:100%;height:100%;border-radius:10px;object-fit:cover}
  .img-upload .preview .placeholder{font-size:28px;color:#ccc}
  .img-upload .info{font-size:12px;color:#999;flex:1}
  .img-upload input[type=file]{display:none}
  .img-upload .upload-btn{padding:6px 14px;border:1px solid var(--green);color:var(--green);border-radius:6px;font-size:13px;cursor:pointer;background:#fff;white-space:nowrap}
  .img-upload .upload-btn:active{background:#f0fff4}
  .file-status{font-size:12px;color:var(--green);margin-bottom:8px}
  .progress-box{background:#FFF3CD;border-radius:8px;padding:12px 16px;font-size:13px;color:#856404;margin-top:12px;display:none;line-height:1.6}
  .progress-box.show{display:block}

  /* === Modal === */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:100}
  .overlay.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:500px;border-radius:16px 16px 0 0;padding:20px 0 0;max-height:70vh;display:flex;flex-direction:column;animation:slideUp .25s}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet h3{text-align:center;font-size:16px;margin-bottom:8px;padding:0 20px}
  .sheet .list{overflow-y:auto;flex:1;padding-bottom:env(safe-area-inset-bottom)}
  .sheet .ex-item{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;border-bottom:1px solid #F0F0F0}
  .sheet .ex-item:active{background:#F5F5F5}
  .sheet .ex-info{flex:1;min-width:0}
  .sheet .ex-name{font-size:15px;font-weight:500}
  .sheet .ex-desc{font-size:12px;color:#999}
  .sheet .ex-item .del{color:var(--danger);font-size:12px;padding:6px 10px;cursor:pointer}
  .sheet .cancel{display:block;width:100%;padding:16px;text-align:center;border:none;background:#F5F5F5;font-size:15px;color:#666;cursor:pointer;margin-top:8px}
  .sheet .subtitle{text-align:center;font-size:12px;color:#999;margin-bottom:12px;padding:0 20px}

  /* === Toast === */
  .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center}
  .toast.show{opacity:1}
  .toast.info{background:#333}
</style>
</head>
<body>

<!-- ========== Landing Page ========== -->
<div class="page active" id="page-landing">
  <div class="landing">
    <div class="landing-inner">
      <h1>💔</h1>
      <h1 style="margin-top:0">前任 AI</h1>
      <div class="sub">把 ta 的聊天方式蒸馏成 AI<br>用 ta 的方式，再说几句话</div>
      <div class="mini-ex-list" id="quickExList"></div>
      <div class="card">
        <p>🔑 需要 API Key 才能聊天</p>
        <input type="password" id="apiKeyInput" placeholder="粘贴你的 API Key（存本地，不上传）">
        <input type="text" id="apiUrlInput" placeholder="API Base URL（可选）" value="https://api.deepseek.com/anthropic">

        <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>

        你的 API Key 只存在浏览器本地，不会上传到任何服务器。<br>
        支持 Anthropic / DeepSeek 兼容 API。<br>
        <a href="https://platform.deepseek.com/api_keys" target="_blank">获取 DeepSeek Key →</a>
      </div>
    </div>
  </div>
</div>

<!-- ========== Chat Page ========== -->
<div class="page" id="page-chat">
  <div class="chat-bg" id="chatBg"></div>
  <div class="topbar">
    <div class="back" onclick="goLanding()">←</div>
    <div class="info">
      <div class="name" id="exName">前任</div>
    </div>
    <button class="act-btn" onclick="showExPicker()">切换</button>
    <button class="act-btn" onclick="showCreate()">+新建</button>

  <div class="messages" id="messages">
    <div class="empty-chat" id="emptyChat">
      <div class="icon">💬</div>
      <div class="hint" id="emptyHint">发送第一条消息吧</div>
    </div>
  </div>
  <div class="input-area" style="position:relative">
    <div class="emoji-picker" id="emojiPicker"></div>
    <button class="emoji-btn" onclick="toggleEmoji()" title="表情">😊</button>
    <textarea id="msgInput" rows="1" placeholder="" maxlength="2000" autocomplete="off"></textarea>
    <button id="sendBtn" onclick="sendMsg()">发送</button>
  </div>
</div>

<!-- ========== Create Page ========== -->
<div class="page create-page" id="page-create">
  <div class="createtop" id="createTop">创建前任 AI</div>
  <div class="create-form" id="createFormEl">
    <h3>📝 基本信息</h3>
    <label>花名 / 代号 *</label>
    <input type="text" id="cfName" placeholder="如：小明 / 那个人 / 初恋" maxlength="30">

    <input type="text" id="cfNote" placeholder="如：🐷猪头 / 宝贝" maxlength="30">

    <input type="text" id="cfJob" placeholder="如：互联网产品经理">

    <input type="text" id="cfDesc" placeholder="如：在一起两年，分手半年了">
    <label>性格标签</label>
    <input type="text" id="cfTags" placeholder="如：毒舌，傲娇，心思细腻，容易炸毛">
    <label>爱好</label>
    <input type="text" id="cfHobbies" placeholder="如：打游戏，看电影，吃火锅">
    <label>喜欢的东西</label>
    <input type="text" id="cfLikes" placeholder="如：猫，雨天，冰美式">
    <label>讨厌的东西</label>
    <input type="text" id="cfDislikes" placeholder="如：香菜，等人，早起">

    <h3>📷 头像 & 背景</h3>
    <div class="row">
      <div style="flex:1">
        <label>ta 的头像</label>
        <div class="img-upload">
          <div class="preview" id="previewExAvatar"><span class="placeholder">🙂</span></div>
          <div>
            <div class="info" id="infoExAvatar">未选择</div>
            <button class="upload-btn" onclick="document.getElementById('fileExAvatar').click()">选择图片</button>

          </div>

      </div>
      <div style="flex:1">
        <label>我的头像</label>
        <div class="img-upload">
          <div class="preview" id="previewMyAvatar"><span class="placeholder">🧑</span></div>
          <div>
            <div class="info" id="infoMyAvatar">未选择</div>
            <button class="upload-btn" onclick="document.getElementById('fileMyAvatar').click()">选择图片</button>
            <input type="file" id="fileMyAvatar" accept="image/*" onchange="previewImg(this,'previewMyAvatar','infoMyAvatar','myAvatarData')">
          </div>
        </div>
      </div>
    </div>
    <label>聊天背景</label>
    <div class="img-upload">
      <div class="preview" id="previewBg"><span class="placeholder">🖼️</span></div>
      <div>
        <div class="info" id="infoBg">未选择（可选）</div>
        <button class="upload-btn" onclick="document.getElementById('fileBg').click()">选择图片</button>

    <h3>💬 聊天记录（可选但强烈推荐）</h3>

2023-03-15 21:30 对方：今天好累啊
2023-03-15 21:32 我：怎么了
...
或者直接粘贴：
她说：你今天怎么没回我消息
我说：刚刚在开会"></textarea>
    <label>ta 的口头禅 / 惯用语</label>
    <input type="text" id="cfPhrases" placeholder="如：哈哈哈 / 随便 / 别烦我 / 嗯嗯 / 好哦">

    <h3>🎯 关系记忆（可选）</h3>
    <label>你们之间难忘的事、共同经历</label>
    <textarea id="cfMemory" rows="3" placeholder="如：一起在厦门看过日出 / ta 最讨厌吃香菜 / 每年生日都会收到 ta 的手写信..."></textarea>
    <label style="margin-top:8px">或上传恋爱经过文档</label>

    <button class="btn btn-primary" id="createBtn" onclick="createEx()">✨ 生成前任 AI</button>

<script>
// === 缓存版本检查（解决微信浏览器缓存） ===
(function(){
  var BUILD = '20260710b';
  var urlV = new URL(location.href).searchParams.get('v');
  if (urlV !== BUILD) {
    // 版本不对，强制跳转到最新版本
    var u = new URL(location.href);
    u.searchParams.set('v', BUILD);
    location.replace(u.toString());
  }
})();

// ============================================================
//  Storage (IndexedDB)
// ============================================================
const DB_NAME='exchat_db',STORE_NAME='exes';
function openDB(){return new Promise((resolve,reject)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>{r.result.createObjectStore(STORE_NAME,{keyPath:'slug'})};r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error)})}
async function loadExes(){try{const db=await openDB();return await new Promise((resolve,reject)=>{const tx=db.transaction(STORE_NAME,'readonly');const req=tx.objectStore(STORE_NAME).getAll();req.onsuccess=()=>resolve(req.result||[]);req.onerror=()=>reject(req.error)})}catch(e){return[]}}
async function saveEx(ex){try{const db=await openDB();return await new Promise((resolve,reject)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).put(ex);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}catch(e){console.error(e)}}
async function deleteExDB(slug){try{const db=await openDB();return await new Promise((resolve,reject)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).delete(slug);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}catch(e){console.error(e)}}
async function saveExes(exes){for(const e of exes)await saveEx(e)}
async function updateExChat(slug,chatHistory){try{const exes=await loadExes();const i=exes.findIndex(e=>e.slug===slug);if(i>=0){exes[i].chatHistory=chatHistory;await saveEx(exes[i])}}catch(e){console.error(e)}}

const DEMO_MODE='__demo__';
let currentEx=null;
let history=[];
let isLoading=false;
let imgData={exAvatarData:null,myAvatarData:null,bgData:null};

// ============================================================
//  Init
// ============================================================
document.addEventListener('DOMContentLoaded',async()=>{
  loadConfig();
  await renderLandingExes();
  checkShowCreateBtn();
  buildEmojiPicker();
  const ta=document.getElementById('msgInput');
  ta.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
  });
  ta.addEventListener('input',()=>{
    ta.style.height='auto';
    ta.style.height=Math.min(ta.scrollHeight,100)+'px';
  });
});

// ============================================================
//  Config
// ============================================================
function loadConfig(){
  const s=localStorage.getItem(CONFIG_KEY);
  if(s) try{
    const c=JSON.parse(s);
    document.getElementById('apiKeyInput').value=c.key||'';
    document.getElementById('apiUrlInput').value=c.url||'https://api.deepseek.com/anthropic';
    document.getElementById('modelInput').value=c.model||'deepseek-v4-pro';
  }catch(e){}

function estimateMessages(text){
  const lines=text.split('\n').filter(l=>l.trim());
  const msgLines=lines.filter(l=>/\d{1,2}:\d{2}|^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/.test(l));
  return msgLines.length||lines.length;
}

// ============================================================
//  WeChat Log Parser (JS)
// ============================================================
function parseWeChatLog(text){
  // Try multiple common formats
  const lines=text.split('\n').filter(l=>l.trim());
  const msgs=[];
  // Format 1: "2023-03-15 21:30:45 昵称\n消息内容"
  // Format 2: "2023/3/15 21:30 昵称 消息"
  // Format 3: "昵称 2023-03-15 21:30\n消息内容"
  // Format 4: "[昵称] 消息" (simple)
  const re1=/^(\d{4}[-\/]\d{1,2}[-\/]\d{1,2}\s+\d{1,2}:\d{2}(?::\d{2})?)\s+(.+)/;
  const re2=/^(\d{4}[-\/]\d{1,2}[-\/]\d{1,2}\s+\d{1,2}:\d{2}(?::\d{2})?)\s+(\S+)[:\s](.*)/;

  let currentSender=null,currentMsg=[];
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    const m1=line.match(re1);
    const m2=line.match(re2);
    if(m2){
      if(currentSender&&currentMsg.length){
        msgs.push({sender:currentSender,content:currentMsg.join('\n')});
      }
      currentSender=m2[2];
      currentMsg=[m2[3]||''];
    }else if(m1){
      currentSender=m1[2];
      currentMsg=[];
    }else if(currentSender){
      currentMsg.push(line);
    }else{
      // Check for simple "Name: message" or "Name：message"
      const simple=line.match(/^(\S{1,20})[：:]\s*(.+)/);
      if(simple){
        if(currentSender&&currentMsg.length){
          msgs.push({sender:currentSender,content:currentMsg.join('\n')});
        }
        currentSender=simple[1];
        currentMsg=[simple[2]];
      }else if(currentMsg.length){
        currentMsg.push(line);
      }
    }
  }
  if(currentSender&&currentMsg.length){
    msgs.push({sender:currentSender,content:currentMsg.join('\n')});
  }
  return msgs;
}

function filterPartnerMsgs(msgs,exName){
  // Try to identify partner's messages
  const senders={};
  msgs.forEach(m=>{senders[m.sender]=(senders[m.sender]||0)+m.content.length});
  const names=Object.keys(senders).sort((a,b)=>senders[b]-senders[a]);
  // Heuristic: partner is the most talkative sender that isn't user-like
  const userNamePatterns=['我','自己','本人',exName];
  const partner=names.find(n=>!userNamePatterns.some(p=>n.includes(p)))||names[0];
  const partnerMsgs=msgs.filter(m=>m.sender===partner);
  const otherMsgs=msgs.filter(m=>m.sender!==partner);
  return{partnerName:partner,partnerMsgs,otherMsgs};
}

async function sendMsg(){
  if(isLoading)return;
  if(!currentEx){toast('请先选择一个前任');return}
  const cfg=getConfig();
  if(cfg.key===DEMO_MODE){toast('演示模式无法聊天，请先配置 API Key');return}
  if(!cfg.key){toast('请先在首页配置 API Key');return}

  const text=document.getElementById('msgInput').value.trim();
  if(!text)return;
  document.getElementById('msgInput').value='';
  document.getElementById('msgInput').style.height='auto';

  // Split into sentences for natural rhythm
  addMsg('self',text);
  isLoading=true;

  const systemPrompt=currentEx.persona
    +(currentEx.memory?'\n\n---\n## 共同记忆\n'+currentEx.memory:'')
    +'\n\n---\n## 对话规则\n'
    +'你现在就是'+currentEx.name+'本人，不是AI。用ta的口语和节奏说话。\n'
    +'回复要简短自然，像真人微信聊天。保持ta的棱角和真实感。\n'
    +'如果信息不足（问了你不知道的事），用ta的方式回应（敷衍/反问/转移话题）。\n'
    +'一次回复2-5个短句，可以连发。用中文回复。';

  const apiMessages=[],recent=history.slice(-40);
  for(let i=0;i<recent.length;i++){
    const h=recent[i];
    if(i===recent.length-1&&h.role==='self')continue;
    apiMessages.push({role:h.role==='ex'?'assistant':'user',content:h.content});
  }
  apiMessages.push({role:'user',content:text});

  try{
    const reply=await callAPI(null,systemPrompt,apiMessages,1024);
    if(reply){
      // Split reply into natural sentences for multi-bubble effect
      const sentences=splitIntoSentences(reply);
      for(const s of sentences){
        if(s.trim())addMsg('ex',s.trim());
      }
    }
  }catch(e){addMsg('ex','(出错: '+e.message+')')}
  finally{isLoading=false}
}

function splitIntoSentences(text){
  // Split on Chinese/English sentence-ending punctuation, keeping the punctuation
  const parts=text.split(/(?<=[。！？；\.!\?;\n])/);
  const result=[];
  let buf='';
  for(const p of parts){
    buf+=p;
    if(/[。！？；\.!\?;\n]$/.test(p)||buf.length>50){
      result.push(buf.trim());buf='';
    }
  }
  if(buf.trim())result.push(buf.trim());
  return result.length?result:[text];
}

async function callAPI(userPrompt,systemPrompt,messages,maxTokens){
  const cfg=getConfig();
  if(!cfg.key||cfg.key===DEMO_MODE)throw new Error('未配置 API Key');

  const body={model:cfg.model,max_tokens:maxTokens||1024,messages:userPrompt?[{role:'user',content:userPrompt}]:(messages||[{role:'user',content:'你好'}])};
  if(systemPrompt)body.system=systemPrompt;

  const resp=await fetch(`${cfg.url}/v1/messages`,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':cfg.key,'anthropic-version':'2023-06-01'},body:JSON.stringify(body)});
  if(!resp.ok){const err=await resp.text().catch(()=>'Unknown');throw new Error(`API ${resp.status}: ${err.slice(0,200)}`)}
  const data=await resp.json();
  let text='';
  for(const block of(data.content||[])){if(block.type==='text')text+=block.text}
  return text.trim();
}

function toast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type==='info'?' info':'');clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>el.className='toast',3000)}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
