<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>前任 AI - Ex Chat</title>
<style>
  :root {
    --bg: #EDEDED; --topbar: #2E2E2E; --bubble-self: #95EC69;
    --bubble-other: #FFF; --text: #1A1A1A; --muted: #999;
    --green: #07C160; --danger: #E04840; --border: #E0E0E0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* === Pages === */
  .page { display: none; flex-direction: column; height: 100dvh; }
  .page.active { display: flex; }

  /* === Landing Page === */
  .landing { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; align-items: center; justify-content: center; text-align: center; padding: 24px; }
  .landing h1 { font-size: 42px; margin-bottom: 8px; }
  .landing .sub { font-size: 15px; opacity: 0.65; margin-bottom: 32px; line-height: 1.6; }
  .landing .card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; max-width: 380px; width: 100%; backdrop-filter: blur(10px); }
  .landing .card p { font-size: 13px; opacity: 0.7; margin-bottom: 12px; text-align: left; }
  .landing input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 14px; outline: none; margin-bottom: 10px; font-family: monospace; }
  .landing input::placeholder { color: rgba(255,255,255,0.35); }
  .landing .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; }
  .btn-primary { background: #07C160; color: #fff; }
  .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }
  .btn-primary:active { background: #06AD56; }
  .landing .note { font-size: 11px; opacity: 0.4; margin-top: 20px; line-height: 1.6; }
  .landing .note a { color: inherit; }

  /* === Chat Page (WeChat style) === */
  .topbar { background: var(--topbar); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-top: max(12px, env(safe-area-inset-top)); }
  .topbar .back { font-size: 20px; cursor: pointer; opacity: 0.8; }
  .topbar .info { flex:1; min-width:0; }
  .topbar .name { font-size: 17px; font-weight: 600; }
  .topbar .detail { font-size: 12px; opacity: 0.55; margin-top: 1px; }
  .topbar .actions { display: flex; gap: 6px; }
  .topbar .act-btn { font-size: 12px; background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap; }

  .messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
  .msg-row { display: flex; flex-direction: column; max-width: 75%; animation: fadeUp .25s; word-break: break-word; }
  .msg-row.self { align-self: flex-end; align-items: flex-end; }
  .msg-row.other { align-self: flex-start; align-items: flex-start; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .bubble { padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.55; white-space: pre-wrap; }
  .self .bubble { background: var(--bubble-self); color: #000; border-top-right-radius: 2px; }
  .other .bubble { background: var(--bubble-other); color: var(--text); border-top-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  .msg-row .time { font-size: 10px; color: #B0B0B0; margin-top: 3px; padding: 0 4px; }

  .typing { align-self: flex-start; padding: 10px 14px; background: #fff; border-radius: 8px; border-top-left-radius: 2px; display: none; gap: 4px; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
  .typing.active { display: flex; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #BBB; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color: #BBB; gap: 10px; text-align: center; padding: 40px; }
  .empty-chat .icon { font-size: 40px; }
  .empty-chat .hint { font-size: 12px; color: #CCC; }

  .input-area { background: #F7F7F7; padding: 10px 12px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; border-top: 1px solid var(--border); padding-bottom: max(10px, env(safe-area-inset-bottom)); }
  .input-area input { flex: 1; border: 1px solid #DDD; border-radius: 8px; padding: 10px 14px; font-size: 15px; outline: none; background: #fff; min-width: 0; }
  .input-area input:focus { border-color: var(--green); }
  .input-area button { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 15px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
  .input-area button:active { background: #06AD56; }
  .input-area button:disabled { background: #BEBEBE; }

  /* === Create Page === */
  .create-page { background: var(--bg); overflow-y: auto; }
  .create-page .createtop { background: var(--topbar); color: #fff; padding: 12px 16px; font-size: 17px; font-weight: 600; text-align: center; padding-top: max(12px, env(safe-area-inset-top)); }
  .create-form { padding: 20px; max-width: 500px; margin: 0 auto; }
  .create-form h3 { font-size: 16px; margin: 20px 0 8px; color: #555; }
  .create-form h3:first-child { margin-top: 0; }
  .create-form label { font-size: 13px; color: #888; display: block; margin-bottom: 4px; }
  .create-form input, .create-form textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #DDD; font-size: 15px; outline: none; font-family: inherit; margin-bottom: 10px; }
  .create-form textarea { resize: vertical; min-height: 80px; }
  .create-form input:focus, .create-form textarea:focus { border-color: var(--green); }
  .create-form .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .create-form .btn:disabled { background: #CCC; color: #999; }
  .progress-box { background: #FFF3CD; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #856404; margin-top: 12px; display: none; line-height: 1.6; }
  .progress-box.show { display: block; }

  /* === Ex Picker Modal === */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
  .overlay.show { display: flex; }
  .sheet { background: #fff; width: 100%; max-width: 500px; border-radius: 16px 16px 0 0; padding: 20px 0 0; max-height: 70vh; display: flex; flex-direction: column; animation: slideUp .25s; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet h3 { text-align: center; font-size: 16px; margin-bottom: 8px; padding: 0 20px; }
  .sheet .list { overflow-y: auto; flex: 1; padding-bottom: env(safe-area-inset-bottom); }
  .sheet .ex-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; border-bottom: 1px solid #F0F0F0; justify-content: space-between; }
  .sheet .ex-item:active { background: #F5F5F5; }
  .sheet .ex-item .ex-info { flex: 1; min-width: 0; }
  .sheet .ex-name { font-size: 15px; font-weight: 500; }
  .sheet .ex-desc { font-size: 12px; color: #999; margin-top: 2px; }
  .sheet .ex-item .del { color: var(--danger); font-size: 12px; padding: 6px 10px; cursor: pointer; }
  .sheet .cancel { display: block; width: 100%; padding: 16px; text-align: center; border: none; background: #F5F5F5; font-size: 15px; color: #666; cursor: pointer; margin-top: 8px; }
  .sheet .subtitle { text-align: center; font-size: 12px; color: #999; margin-bottom: 12px; padding: 0 20px; }

  /* === Toast === */
  .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: var(--danger); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 90vw; text-align: center; }
  .toast.show { opacity: 1; }
  .toast.info { background: #333; }

  /* === Landing mini-info === */
  .mini-ex-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
  .mini-ex-tag { background: rgba(255,255,255,0.15); padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
  .mini-ex-tag:active { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<!-- ========== PAGE: Landing / Home ========== -->
<div class="page active" id="page-landing">
  <div class="landing">
    <h1>💔</h1>
    <h1 style="margin-top:0">前任 AI</h1>
    <div class="sub">把 ta 的聊天方式蒸馏成 AI<br>用 ta 的方式，再说几句话</div>

    <div class="mini-ex-list" id="quickExList"></div>

    <div class="card">
      <p>🔑 需要 API Key 才能聊天</p>
      <input type="password" id="apiKeyInput" placeholder="粘贴你的 API Key（存本地，不上传）">
      <input type="text" id="apiUrlInput" placeholder="API Base URL（可选）" value="https://api.deepseek.com/anthropic">
      <input type="text" id="modelInput" placeholder="Model（可选）" value="deepseek-v4-pro">
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
      <button class="btn btn-primary" id="btnCreateFirst" onclick="showCreate()" style="margin-top:6px;display:none">👉 创建前任 AI</button>
      <button class="btn btn-secondary" onclick="quickStart()" style="margin-top:6px">跳过，用演示模式（仅预览）</button>
    </div>
    <div class="note">
      你的 API Key 只存在浏览器本地，不会上传到任何服务器。<br>
      支持 Anthropic / DeepSeek 兼容 API。<br>
      <a href="https://platform.deepseek.com/api_keys" target="_blank">获取 DeepSeek Key →</a>
    </div>
  </div>
</div>

<!-- ========== PAGE: Chat ========== -->
<div class="page" id="page-chat">
  <div class="topbar">
    <div class="back" onclick="goLanding()">←</div>
    <div class="info">
      <div class="name" id="exName">前任</div>
      <div class="detail" id="exDetail"></div>
    </div>
    <div class="actions">
      <button class="act-btn" onclick="showExPicker()">切换</button>
      <button class="act-btn" onclick="showCreate()">+新建</button>
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="empty-chat" id="emptyChat">
      <div class="icon">💬</div>
      <div class="hint" id="emptyHint">发送第一条消息吧</div>
    </div>
    <div class="typing" id="typing"><span></span><span></span><span></span></div>
  </div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="输入消息..." maxlength="1000" autocomplete="off">
    <button id="sendBtn" onclick="sendMsg()">发送</button>
  </div>
</div>

<!-- ========== PAGE: Create Ex ========== -->
<div class="page" id="page-create">
  <div class="createtop" id="createTop">创建前任 AI</div>
  <div class="create-form">
    <h3>📝 基本信息</h3>
    <label>花名 / 代号 *</label>
    <input type="text" id="cfName" placeholder="如：小明 / 那个人 / 初恋" maxlength="30">
    <label>一句话描述</label>
    <input type="text" id="cfDesc" placeholder="如：在一起两年，分手半年，互联网产品经理">
    <label>性格标签</label>
    <input type="text" id="cfTags" placeholder="如：毒舌，傲娇，心思细腻，容易炸毛">

    <h3>💬 聊天记录（可选但强烈推荐）</h3>
    <label>粘贴你们的聊天记录，越真实越好。微信长按对话 → 多选 → 逐条选择 → 收藏 → 从收藏复制出来。</label>
    <textarea id="cfChats" rows="6" placeholder="格式不限，可以是：
2023-03-15 21:30 对方：今天好累啊
2023-03-15 21:32 我：怎么了
...或者直接粘贴对话内容..."></textarea>

    <label>ta 的口头禅 / 惯用语</label>
    <input type="text" id="cfPhrases" placeholder="如：哈哈哈 / 随便 / 别烦我 / 嗯嗯">

    <h3>🎯 关系记忆（可选）</h3>
    <label>你们之间难忘的事、共同经历</label>
    <textarea id="cfMemory" rows="3" placeholder="如：一起在厦门看过日出 / ta 最讨厌吃香菜 / 每年生日都会收到 ta 的手写信..."></textarea>

    <button class="btn btn-primary" id="createBtn" onclick="createEx()">✨ 生成前任 AI</button>
    <div class="progress-box" id="progress"></div>
    <button class="btn btn-secondary" onclick="goLanding()" style="margin-top:6px">取消</button>
    <div style="height:40px"></div>
  </div>
</div>

<!-- ========== Ex Picker Modal ========== -->
<div class="overlay" id="pickerOverlay" onclick="hideExPicker(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <h3>选择前任</h3>
    <div class="subtitle" id="pickerSubtitle"></div>
    <div class="list" id="exList"></div>
    <button class="cancel" onclick="hideExPicker()">取消</button>
  </div>
</div>

<!-- ========== Toast ========== -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  State
// ============================================================
let currentEx = null;       // { slug, name, persona, memory, profile }
let history = [];            // [{ role:'self'|'ex', content }]
let isLoading = false;
const DEMO_MODE = '__demo__';
const EXES_KEY = 'exchat_exes';       // localStorage key for all exes
const CONFIG_KEY = 'exchat_config';   // localStorage key for API config

// ============================================================
//  Init
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  loadConfig();
  renderLandingExes();
  checkShowCreateBtn();
  document.getElementById('msgInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });
});

function loadConfig() {
  const saved = localStorage.getItem(CONFIG_KEY);
  if (saved) {
    try {
      const c = JSON.parse(saved);
      document.getElementById('apiKeyInput').value = c.key || '';
      document.getElementById('apiUrlInput').value = c.url || 'https://api.deepseek.com/anthropic';
      document.getElementById('modelInput').value = c.model || 'deepseek-v4-pro';
    } catch(e) {}
  }
}

function getConfig() {
  const saved = localStorage.getItem(CONFIG_KEY);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return { key: '', url: 'https://api.deepseek.com/anthropic', model: 'deepseek-v4-pro' };
}

function saveConfig() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { toast('请粘贴 API Key'); return; }
  const cfg = {
    key: key,
    url: document.getElementById('apiUrlInput').value.trim() || 'https://api.deepseek.com/anthropic',
    model: document.getElementById('modelInput').value.trim() || 'deepseek-v4-pro',
  };
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
  toast('配置已保存 ✓', 'info');
  renderLandingExes();
  checkShowCreateBtn();
  // auto-open chat if exes exist
  const exes = loadExes();
  if (exes.length > 0) {
    selectEx(exes[0]);
    showPage('page-chat');
  }
}

function checkShowCreateBtn() {
  const cfg = getConfig();
  const exes = loadExes();
  const hasKey = cfg.key && cfg.key !== DEMO_MODE;
  const btn = document.getElementById('btnCreateFirst');
  if (hasKey && exes.length === 0) {
    btn.style.display = 'block';
  } else {
    btn.style.display = 'none';
  }
}


function quickStart() {
  const cfg = { key: DEMO_MODE, url: '', model: '' };
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
  toast('演示模式：可以查看界面，但发消息不会回复', 'info');
  renderLandingExes();
  const exes = loadExes();
  if (exes.length > 0) {
    selectEx(exes[0]);
    showPage('page-chat');
  }
}

// ============================================================
//  Exes Storage
// ============================================================
function loadExes() {
  try {
    return JSON.parse(localStorage.getItem(EXES_KEY)) || [];
  } catch(e) { return []; }
}

function saveExes(exes) {
  localStorage.setItem(EXES_KEY, JSON.stringify(exes));
}

function renderLandingExes() {
  const exes = loadExes();
  const el = document.getElementById('quickExList');
  if (exes.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = exes.map(e => {
    const p = e.profile || {};
    return `<span class="mini-ex-tag" onclick="selectEx(loadExes().find(x=>x.slug==='${e.slug}'));showPage('page-chat')">💁 ${escHtml(e.name)}</span>`;
  }).join('');
}

// ============================================================
//  Navigation
// ============================================================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'page-chat') {
    refreshChatView();
    document.getElementById('msgInput').focus();
  }
}

function goLanding() {
  showPage('page-landing');
  renderLandingExes();
  checkShowCreateBtn();
}

function showCreate(editSlug) {
  showPage('page-create');
  document.getElementById('createTop').textContent = editSlug ? '编辑前任' : '创建前任 AI';
  if (!editSlug) {
    document.getElementById('cfName').value = '';
    document.getElementById('cfDesc').value = '';
    document.getElementById('cfTags').value = '';
    document.getElementById('cfChats').value = '';
    document.getElementById('cfPhrases').value = '';
    document.getElementById('cfMemory').value = '';
    document.getElementById('progress').classList.remove('show');
  }
}

// ============================================================
//  Create Ex (LLM-powered persona generation)
// ============================================================
async function createEx() {
  const cfg = getConfig();
  if (cfg.key === DEMO_MODE) { toast('演示模式无法创建，请先配置 API Key'); return; }
  if (!cfg.key) { toast('请先在首页配置 API Key'); return; }

  const name = document.getElementById('cfName').value.trim();
  if (!name) { toast('至少填个花名/代号吧'); return; }

  const desc = document.getElementById('cfDesc').value.trim();
  const tags = document.getElementById('cfTags').value.trim();
  const chats = document.getElementById('cfChats').value.trim();
  const phrases = document.getElementById('cfPhrases').value.trim();
  const memory = document.getElementById('cfMemory').value.trim();

  const btn = document.getElementById('createBtn');
  const prog = document.getElementById('progress');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  prog.classList.add('show');
  prog.innerHTML = '🧠 正在分析你提供的信息...<br>这可能需要 10-30 秒';

  const buildPrompt = `你是一位人物分析专家。请根据以下信息，生成一份详细的人物性格档案。

【基本信息】
- 名字/代号：${name}
- 关系概况：${desc || '未知'}
- 性格标签：${tags || '未知'}

【口头禅/惯用语】
${phrases || '未提供'}

【聊天记录片段】
${chats || '未提供'}

【共同记忆】
${memory || '未提供'}

请生成以下格式的 persona（用 Markdown），严格按照 5 个 Layer：

## Layer 0：硬规则
1. 你是${name}，不是 AI，不是助手，不是机器人
2. 不说${name}在现实中绝不可能说的话
3. 不突然变得完美、温柔、无条件包容
4. 不主动说"我爱你"、"我想你"（除非原材料里有）
5. 保持ta的"棱角"：真实的不完美
6. 被问到不想回答的问题时，可以回避、敷衍、转移话题

## Layer 1：身份
- 名字：${name}
- 职业/身份：（根据信息推断）
- MBTI猜测：（根据说话风格推断）
- 和用户的关系：前任

## Layer 2：说话风格
- 口头禅：
- 语气词偏好：
- 标点风格：
- emoji习惯：
- 消息格式（短句连发/长段落）：
- 对用户的称呼：
- 3个典型对话示例：

## Layer 3：情感模式
- 依恋类型推断：
- 表达关心的方式：
- 生气时的表现：
- 难过时的表现：
- 雷区/敏感话题：

## Layer 4：关系行为
- 在关系中的角色：
- 争吵模式：
- 联系频率/主动程度：
- 边界和底线：

请确保：
1. 所有的行为描述都基于提供的信息推断，而非凭空编造
2. 如果某个维度信息不足，标注「基于有限信息推断」
3. 口头禅和说话风格必须由聊天记录支撑
4. 对话示例要贴近真实的微信聊天感
5. 直接输出 persona 内容，不需要解释`;

  try {
    const resp = await callAPI(buildPrompt, '你是一位专业的人物心理分析专家。请直接输出分析结果。');
    prog.innerHTML = '✅ 生成完成！正在保存...';

    // Parse persona
    const persona = resp.trim();

    // Generate slug
    const slug = name.replace(/[^a-zA-Z0-9一-龥]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || 'ex';

    const ex = {
      slug: slug,
      name: name,
      persona: persona,
      memory: memory || '',
      profile: {
        occupation: desc.split(/[,，]/)[0] || '',
        city: '',
        mbti: (persona.match(/MBTI[：:]\s*(\w+)/) || [])[1] || '',
        zodiac: '',
      },
      createdAt: new Date().toISOString(),
      chatHistory: [],
    };

    // Save to localStorage
    const exes = loadExes();
    const idx = exes.findIndex(e => e.slug === slug);
    if (idx >= 0) {
      // update existing - keep old chatHistory
      ex.chatHistory = exes[idx].chatHistory || [];
      exes[idx] = ex;
    } else {
      exes.push(ex);
    }
    saveExes(exes);

    prog.innerHTML = '🎉 创建成功！即将跳转到聊天...';

    setTimeout(() => {
      selectEx(ex);
      showPage('page-chat');
      btn.disabled = false;
      btn.textContent = '✨ 生成前任 AI';
      prog.classList.remove('show');
    }, 800);

  } catch(e) {
    prog.innerHTML = '❌ 出错：' + e.message;
    btn.disabled = false;
    btn.textContent = '✨ 重试';
  }
}

// ============================================================
//  Chat Logic
// ============================================================
function selectEx(ex) {
  currentEx = ex;
  history = ex.chatHistory || [];
  document.getElementById('exName').textContent = ex.name;
  const p = ex.profile || {};
  const parts = [p.occupation, p.city, p.mbti, p.zodiac].filter(Boolean);
  document.getElementById('exDetail').textContent = parts.join(' · ') || '前任';
  refreshChatView();
  hideExPicker();
}

function refreshChatView() {
  const empty = document.getElementById('emptyChat');
  const msgs = document.getElementById('messages');
  const typing = document.getElementById('typing');

  empty.style.display = history.length === 0 ? 'flex' : 'none';
  if (currentEx) {
    document.getElementById('emptyHint').textContent = `给 ${currentEx.name} 发消息吧`;
  }

  // Remove old message rows
  msgs.querySelectorAll('.msg-row').forEach(el => el.remove());

  history.forEach(h => {
    const row = document.createElement('div');
    row.className = 'msg-row ' + (h.role === 'self' ? 'self' : 'other');
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = h.content;
    row.appendChild(bub);
    msgs.insertBefore(row, typing);
  });

  scrollBottom();
}

async function sendMsg() {
  if (isLoading) return;
  if (!currentEx) { toast('请先选择一个前任'); return; }

  const cfg = getConfig();
  if (cfg.key === DEMO_MODE) { toast('演示模式无法聊天，请先配置 API Key'); return; }
  if (!cfg.key) { toast('请先在首页配置 API Key'); return; }

  const text = document.getElementById('msgInput').value.trim();
  if (!text) return;

  document.getElementById('msgInput').value = '';
  addMsg('self', text);
  setLoading(true);

  // Build system prompt from persona
  const systemPrompt = currentEx.persona
    + (currentEx.memory ? '\n\n---\n## 共同记忆\n' + currentEx.memory : '')
    + '\n\n---\n## 对话规则\n'
    + `请完全以上述 persona 的身份回复。你就是${currentEx.name}，不是 AI 助手。\n`
    + '保持 ta 的棱角、说话风格和真实感。回复要简短自然，像真人微信聊天。\n'
    + '用 ta 的语气词、口头禅、标点习惯。不要突然变得完美或温柔。\n'
    + '用中文回复。';

  // Build messages array (last 20 turns)
  const apiMessages = [];
  const recent = history.slice(-40); // 20 turns * 2
  for (const h of recent) {
    if (h === recent[recent.length - 1]) continue; // skip the one we just added (it's the current user msg)
    apiMessages.push({
      role: h.role === 'ex' ? 'assistant' : 'user',
      content: h.content,
    });
  }
  apiMessages.push({ role: 'user', content: text });

  try {
    const reply = await callAPI(null, systemPrompt, apiMessages);
    if (reply) {
      addMsg('ex', reply);
    }
  } catch(e) {
    addMsg('ex', '😞 ' + e.message);
  } finally {
    setLoading(false);
  }
}

function addMsg(role, content) {
  history.push({ role, content, time: Date.now() });
  // Persist to storage
  if (currentEx) {
    currentEx.chatHistory = history;
    const exes = loadExes();
    const idx = exes.findIndex(e => e.slug === currentEx.slug);
    if (idx >= 0) {
      exes[idx].chatHistory = history;
      saveExes(exes);
    }
  }
  refreshChatView();
  scrollBottom();
}

function scrollBottom() {
  requestAnimationFrame(() => {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  });
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('typing').classList.toggle('active', v);
  document.getElementById('sendBtn').disabled = v;
  if (v) scrollBottom();
}

// ============================================================
//  API Call (browser -> DeepSeek / Anthropic compatible)
// ============================================================
async function callAPI(userPrompt, systemPrompt, messages) {
  const cfg = getConfig();
  if (!cfg.key || cfg.key === DEMO_MODE) throw new Error('未配置 API Key');

  const isCreateMode = !!userPrompt; // if userPrompt is set, we're generating persona

  const body = {
    model: cfg.model,
    max_tokens: isCreateMode ? 4096 : 1024,
    messages: isCreateMode
      ? [{ role: 'user', content: userPrompt }]
      : (messages || [{ role: 'user', content: '你好' }]),
  };

  if (systemPrompt) {
    body.system = systemPrompt;
  }

  const resp = await fetch(`${cfg.url}/v1/messages`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': cfg.key,
      'anthropic-version': '2023-06-01',
    },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    const err = await resp.text().catch(() => 'Unknown');
    throw new Error(`API ${resp.status}: ${err.slice(0, 200)}`);
  }

  const data = await resp.json();
  let text = '';
  for (const block of (data.content || [])) {
    if (block.type === 'text') text += block.text;
  }
  return text.trim();
}

// ============================================================
//  Ex Picker Modal
// ============================================================
function showExPicker() {
  const exes = loadExes();
  const list = document.getElementById('exList');
  const subtitle = document.getElementById('pickerSubtitle');
  subtitle.textContent = exes.length ? `共 ${exes.length} 个` : '还没有创建前任';

  list.innerHTML = exes.map(e => {
    const p = e.profile || {};
    const desc = [p.occupation, p.mbti].filter(Boolean).join(' · ') || '前任';
    const sel = currentEx && currentEx.slug === e.slug ? '✓' : '';
    return `<div class="ex-item">
      <div class="ex-info" onclick="selectEx(loadExes().find(x=>x.slug==='${e.slug}'));">
        <div class="ex-name">${escHtml(e.name)}</div>
        <div class="ex-desc">${escHtml(desc)}</div>
      </div>
      ${sel ? '<span style="color:#07C160;font-size:18px">✓</span>' : ''}
      <span class="del" onclick="deleteEx('${e.slug}')">删除</span>
    </div>`;
  }).join('');

  if (exes.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:#999">还没有创建前任<br><br><button class="btn btn-primary" style="width:auto;padding:10px 30px" onclick="hideExPicker();showCreate()">创建第一个</button></div>';
  }

  document.getElementById('pickerOverlay').classList.add('show');
}

function hideExPicker(e) {
  if (e && e.target !== document.getElementById('pickerOverlay')) return;
  document.getElementById('pickerOverlay').classList.remove('show');
}

function deleteEx(slug) {
  if (!confirm('确定删除这个前任？所有聊天记录都会被清掉。')) return;
  let exes = loadExes();
  exes = exes.filter(e => e.slug !== slug);
  saveExes(exes);
  if (currentEx && currentEx.slug === slug) {
    currentEx = null;
    history = [];
    goLanding();
  }
  showExPicker();
  renderLandingExes();
  checkShowCreateBtn();
}

// ============================================================
//  Utils
// ============================================================
let _toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type === 'info' ? ' info' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = 'toast', 3000);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
